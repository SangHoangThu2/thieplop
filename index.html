<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thiệp Tri Ân</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            width: 100%;
            height: 100vh;
            background: url("static/background.jpg") no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .card {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
            max-width: 700px;
            animation: fadeIn 2s ease;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.4em;
            line-height: 1.8;
        }

        .from {
            margin-top: 30px;
            font-style: italic;
            font-size: 1.2em;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        button {
            margin-top: 30px;
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: #ff7eb3;
            color: white;
        }

        button:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="card">
        <h1>💐 Lời Tri Ân 💐</h1>

        <p>
            Cảm ơn cô vì đã luôn tận tâm,  
            kiên nhẫn và đồng hành cùng chúng em  
            trên chặng đường học tập.
            <br><br>
            Những bài học hôm nay  
            sẽ là hành trang cho chúng em mai sau.
        </p>

        <div class="from">
            — Tập thể lớp ❤️
        </div>

        <button onclick="playMusic()">🎵 Bật nhạc</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="static/music.mp3" type="audio/mpeg">
    </audio>

    <script>
        function playMusic() {
            document.getElementById("bgMusic").play();
        }
    </script>

</body>
</html>
